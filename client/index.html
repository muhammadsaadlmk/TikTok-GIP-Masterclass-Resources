<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Dev Tools Store</title>
<link rel="icon" type="image/png" href="/favicon.png" />
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;800&display=swap" rel="stylesheet">
<style>
  :root {
    --bg-color: #0d0f12;
    --card-bg: #1a1d24;
    --primary-blue: #0d6efd;
    --primary-hover: #0b5ed7;
    --text-main: #ffffff;
    --text-muted: #9ba1a6;
    --border-color: #2b303b;
    --success-green: #25D366;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; font-family: 'Inter', sans-serif; }
  body { background-color: var(--bg-color); color: var(--text-main); line-height: 1.5; }
  
  /* Header */
  header { display: flex; justify-content: space-between; align-items: center; padding: 20px 5%; border-bottom: 1px solid var(--border-color); background: #0b0c10; }
  .logo { font-size: 1.4rem; font-weight: 800; letter-spacing: 0.5px; }
  .admin-btn { background: transparent; border: 1px solid var(--border-color); color: var(--text-main); padding: 8px 18px; border-radius: 6px; cursor: pointer; transition: 0.2s ease; font-weight: 600; }
  .admin-btn:hover { background: var(--card-bg); border-color: var(--text-muted); }

  /* Hero Section */
  .hero { text-align: center; padding: 60px 20px 40px; }
  .hero h1 { font-size: 2.8rem; margin-bottom: 8px; font-weight: 800; }
  .hero p { color: var(--text-muted); margin-bottom: 30px; letter-spacing: 1px; font-size: 1rem; text-transform: uppercase; }
  .stats { display: flex; justify-content: center; gap: 15px; flex-wrap: wrap; }
  .stat-badge { background: var(--card-bg); padding: 8px 20px; border-radius: 20px; border: 1px solid var(--border-color); display: flex; align-items: center; gap: 8px; font-size: 0.95rem; font-weight: 600; }

  /* App Grid Section */
  .app-section { padding: 40px 5%; max-width: 1100px; margin: 0 auto; min-height: 50vh; }
  .grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 24px; }
  @media (max-width: 900px) { .grid { grid-template-columns: repeat(2, 1fr); } }
  @media (max-width: 500px) { .grid { grid-template-columns: 1fr; } }

  .card { background: var(--card-bg); border-radius: 14px; padding: 24px; text-align: center; border: 1px solid var(--border-color); transition: transform 0.2s ease, box-shadow 0.2s ease; display: flex; flex-direction: column; align-items: center; }
  .card:hover { transform: translateY(-4px); box-shadow: 0 10px 25px rgba(0,0,0,0.3); border-color: #3b404d; }
  .card img { width: 72px; height: 72px; border-radius: 16px; margin-bottom: 16px; object-fit: cover; background: #222; }
  .card h3 { margin-bottom: 8px; font-size: 1.15rem; font-weight: 600; }
  .card .downloads { color: var(--primary-blue); font-size: 0.85rem; margin-bottom: 18px; font-weight: 600; background: rgba(13, 110, 253, 0.1); padding: 4px 10px; border-radius: 12px; }
  .download-btn { background: var(--primary-blue); color: white; border: none; padding: 12px; width: 100%; border-radius: 8px; cursor: pointer; font-weight: 600; transition: 0.2s; font-size: 0.95rem; margin-top: auto; }
  .download-btn:hover { background: var(--primary-hover); }

  /* Support Section */
  .support { text-align: center; padding: 60px 20px; border-top: 1px solid var(--border-color); background: #0b0c10; }
  .support h2 { margin-bottom: 24px; font-size: 1.3rem; }
  .support-btns { display: flex; justify-content: center; gap: 16px; flex-wrap: wrap; }
  .support-btns button { padding: 12px 24px; border-radius: 8px; border: none; cursor: pointer; font-weight: 600; display: flex; align-items: center; gap: 8px; font-size: 0.95rem; }
  .btn-wa { background: var(--success-green); color: white; transition: 0.2s; }
  .btn-wa:hover { background: #20b858; }
  .btn-email { background: transparent; color: white; border: 1px solid var(--border-color); transition: 0.2s; }
  .btn-email:hover { background: var(--card-bg); }

  /* Footer */
  footer { text-align: center; padding: 25px; color: var(--text-muted); border-top: 1px solid var(--border-color); font-size: 0.85rem; background: #0b0c10; }

  /* View Management */
  .view { display: none; animation: fadeIn 0.3s ease; }
  .view.active { display: block; }
  @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }

  /* Floating Admin Button */
  .floating-admin { position: fixed; bottom: 30px; right: 30px; background: var(--card-bg); color: var(--text-muted); border: 1px solid var(--border-color); width: 50px; height: 50px; border-radius: 50%; display: flex; justify-content: center; align-items: center; cursor: pointer; transition: 0.3s ease; box-shadow: 0 4px 15px rgba(0,0,0,0.3); z-index: 100; }
  .floating-admin:hover { background: var(--primary-blue); color: white; border-color: var(--primary-blue); transform: translateY(-3px); }

  /* Admin Login */
  .login-container { max-width: 380px; margin: 120px auto; background: var(--card-bg); padding: 35px 30px; border-radius: 14px; border: 1px solid var(--border-color); text-align: center; box-shadow: 0 10px 30px rgba(0,0,0,0.5); }
  .login-container h2 { margin-bottom: 25px; font-size: 1.4rem; }
  .login-container input { width: 100%; padding: 14px; margin-bottom: 15px; background: var(--bg-color); border: 1px solid var(--border-color); color: white; border-radius: 8px; outline: none; transition: 0.2s; }
  .login-container input:focus { border-color: var(--primary-blue); }
  .login-container button.login-btn { width: 100%; padding: 14px; background: var(--primary-blue); border: none; color: white; border-radius: 8px; cursor: pointer; font-weight: 600; margin-bottom: 15px; font-size: 1rem; transition: 0.2s; }
  .login-container button.login-btn:hover { background: var(--primary-hover); }
  .back-btn { background: transparent; color: var(--text-muted); border: none; cursor: pointer; font-size: 0.9rem; transition: 0.2s; }
  .back-btn:hover { color: white; }

  /* Admin Dashboard */
  .dashboard { max-width: 1000px; margin: 40px auto; padding: 0 20px; }
  .dashboard-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 30px; border-bottom: 1px solid var(--border-color); padding-bottom: 20px; }
  .table-container { background: var(--card-bg); border-radius: 12px; overflow-x: auto; border: 1px solid var(--border-color); }
  table { width: 100%; border-collapse: collapse; min-width: 600px; }
  th, td { padding: 16px; text-align: left; border-bottom: 1px solid var(--border-color); }
  th { background: rgba(0,0,0,0.3); color: var(--text-muted); font-weight: 600; font-size: 0.9rem; text-transform: uppercase; letter-spacing: 0.5px; }
  td { vertical-align: middle; }
  .action-btn { padding: 8px 14px; border-radius: 6px; border: none; cursor: pointer; margin-right: 8px; font-weight: 600; font-size: 0.85rem; transition: 0.2s; }
  .edit-btn { background: #3b404d; color: white; }
  .edit-btn:hover { background: #4a5060; }
  .delete-btn { background: rgba(220, 53, 69, 0.1); color: #ff4d4d; border: 1px solid rgba(220, 53, 69, 0.3); }
  .delete-btn:hover { background: rgba(220, 53, 69, 0.2); }
  
  .add-form { background: var(--card-bg); padding: 25px; border-radius: 12px; margin-bottom: 30px; border: 1px solid var(--border-color); }
  .add-form h3 { margin-bottom: 20px; }
  .form-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 15px; margin-bottom: 15px; }
  .form-grid input.full-width { grid-column: span 2; }
  @media (max-width: 600px) { .form-grid { grid-template-columns: 1fr; } .form-grid input.full-width { grid-column: span 1; } }
  .add-form input { width: 100%; padding: 12px; background: var(--bg-color); border: 1px solid var(--border-color); color: white; border-radius: 6px; outline: none; }
  .add-form input:focus { border-color: var(--primary-blue); }
  .form-actions { display: flex; gap: 10px; }
  .form-actions button { padding: 12px 24px; border-radius: 6px; border: none; cursor: pointer; font-weight: 600; transition: 0.2s; }
  .save-btn { background: var(--primary-blue); color: white; }
  .save-btn:hover { background: var(--primary-hover); }
  .cancel-btn { background: var(--bg-color); color: var(--text-muted); border: 1px solid var(--border-color); }
  .cancel-btn:hover { color: white; }

</style>
</head>
<body>

  <!-- PUBLIC VIEW -->
  <div id="publicView" class="view active">
    <header>
      <div class="logo">DEV TOOLS STORE</div>
      <button class="admin-btn" onclick="showView('loginView')">Admin Panel</button>
    </header>

    <section class="hero">
      <h1>DEV TOOLS</h1>
      <p>PREMIUM APK EDITING KIT</p>
      <div class="stats">
        <div class="stat-badge">
          <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M16 21v-2a4 4 0 0 0-4-4H6a4 4 0 0 0-4 4v2"></path><circle cx="9" cy="7" r="4"></circle><path d="M22 21v-2a4 4 0 0 0-3-3.87"></path><path d="M16 3.13a4 4 0 0 1 0 7.75"></path></svg>
          <span id="visitorCount">0</span> Visitors
        </div>
        <div class="stat-badge">
          <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"></path><polyline points="7 10 12 15 17 10"></polyline><line x1="12" y1="15" x2="12" y2="3"></line></svg>
          <span id="totalDownloads">0</span> Downloads
        </div>
      </div>
    </section>

    <section class="app-section">
      <div class="grid" id="appGrid">
        <!-- Cards injected via JS -->
      </div>
    </section>

    <section class="support">
      <h2>SUPPORT & UPDATES</h2>
      <div class="support-btns">
        <button class="btn-wa">
          <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 11.5a8.38 8.38 0 0 1-.9 3.8 8.5 8.5 0 0 1-7.6 4.7 8.38 8.38 0 0 1-3.8-.9L3 21l1.9-5.7a8.38 8.38 0 0 1-.9-3.8 8.5 8.5 0 0 1 4.7-7.6 8.38 8.38 0 0 1 3.8-.9h.5a8.48 8.48 0 0 1 8 8v.5z"></path></svg>
          JOIN WHATSAPP
        </button>
        <button class="btn-email">
          <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M4 4h16c1.1 0 2 .9 2 2v12c0 1.1-.9 2-2 2H4c-1.1 0-2-.9-2-2V6c0-1.1.9-2 2-2z"></path><polyline points="22,6 12,13 2,6"></polyline></svg>
          EMAIL SUPPORT
        </button>
      </div>
    </section>

    <footer>
      © 2026 Developer Tools Store. All Rights Reserved.
    </footer>
    
    <!-- Floating Admin Button -->
    <button class="floating-admin" onclick="showView('loginView')">
      <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M12 20h9"></path><path d="M16.5 3.5a2.121 2.121 0 0 1 3 3L7 19l-4 1 1-4L16.5 3.5z"></path></svg>
    </button>
  </div>

  <!-- LOGIN VIEW -->
  <div id="loginView" class="view">
    <div class="login-container">
      <h2>ADMIN LOGIN</h2>
      <input type="text" id="username" placeholder="Username">
      <input type="password" id="password" placeholder="Password" onkeypress="if(event.key === 'Enter') login()">
      <button class="login-btn" onclick="login()">LOGIN</button>
      <button class="back-btn" onclick="showView('publicView')">Back to Site</button>
    </div>
  </div>

  <!-- DASHBOARD VIEW -->
  <div id="dashboardView" class="view">
    <header>
      <div class="logo">ADMIN DASHBOARD</div>
      <button class="admin-btn" onclick="logout()">Logout</button>
    </header>
    
    <div class="dashboard">
      <div class="add-form" id="appForm">
        <h3 id="formTitle">Add New App</h3>
        <input type="hidden" id="editId">
        <div class="form-grid">
          <input type="text" id="appName" placeholder="App Name (e.g. Termux)">
          <input type="text" id="appIcon" placeholder="App Icon URL">
          <input type="text" id="appLink" class="full-width" placeholder="Dropbox Download Link">
        </div>
        <div class="form-actions">
          <button class="save-btn" onclick="saveApp()">Save App</button>
          <button class="cancel-btn" onclick="resetForm()">Cancel</button>
        </div>
      </div>

      <div class="table-container">
        <table>
          <thead>
            <tr>
              <th>Icon</th>
              <th>App Name</th>
              <th>Downloads</th>
              <th>Actions</th>
            </tr>
          </thead>
          <tbody id="adminTableBody">
            <!-- Rows injected via JS -->
          </tbody>
        </table>
      </div>
    </div>
  </div>

<script>
  // Initial Default Data
  const defaultApps = [
    { id: 1, name: "Termux", iconUrl: "https://upload.wikimedia.org/wikipedia/commons/4/45/Termux-logo.png", link: "https://dropbox.com/s/termux", downloads: 80 },
    { id: 2, name: "NP Manager", iconUrl: "https://play-lh.googleusercontent.com/yvjD-bS9J_JvBXZr128y0NnOq20G9B22MvA7l07tX8zN54b9w_R300VwA3u9fQ=w240-h480-rw", link: "https://dropbox.com/s/npmanager", downloads: 51 },
    { id: 3, name: "ZArchiver", iconUrl: "https://play-lh.googleusercontent.com/1GZOqA5-aT4-nS4Z90j3D4zBf6Bw8I7y9M16cZfA8H35a-w4bV3w0vV8D_q1D9Fq=w240-h480-rw", link: "https://dropbox.com/s/zarchiver", downloads: 18 },
    { id: 4, name: "Lucky Patcher", iconUrl: "https://www.luckypatchers.com/wp-content/uploads/2016/12/lucky-patcher-icon-150x150.png", link: "https://dropbox.com/s/luckypatcher", downloads: 56 },
    { id: 5, name: "APK Editor", iconUrl: "https://play-lh.googleusercontent.com/P4wZ-1aX-xV9pW100D58K_P3h3aY8I_B8I1E6G44Z_C5tE3Q4x_J3Z757tW=w240-h480-rw", link: "https://dropbox.com/s/apkeditor", downloads: 91 },
    { id: 6, name: "MT Manager", iconUrl: "https://play-lh.googleusercontent.com/4J10X5Q_O6_33D72Q_g4aG9S1B_U2B5N8c3n9G2K_6v6w2N4u03X92W5M0x3eQ=w240-h480-rw", link: "https://dropbox.com/s/mtmanager", downloads: 63 },
    { id: 7, name: "Bot X Dialog", iconUrl: "https://i.ibb.co/L5Q2G8W/botx.png", link: "https://dropbox.com/s/botxdialog", downloads: 84 },
    { id: 8, name: "APK Tool M", iconUrl: "https://i.ibb.co/3sDZXkG/apktoolm.png", link: "https://dropbox.com/s/apktoolm", downloads: 109 }
  ];

  // --- State Management ---
  function getApps() {
    return JSON.parse(localStorage.getItem('dev_store_apps')) || defaultApps;
  }
  function saveApps(apps) {
    localStorage.setItem('dev_store_apps', JSON.stringify(apps));
  }
  
  // Track unique visitors per session
  let visitors = parseInt(localStorage.getItem('dev_store_visitors') || '602');
  if(!sessionStorage.getItem('dev_store_visited')) {
    visitors++;
    localStorage.setItem('dev_store_visitors', visitors);
    sessionStorage.setItem('dev_store_visited', 'true');
  }

  function updateStats() {
    document.getElementById('visitorCount').innerText = visitors;
    const apps = getApps();
    const totalDls = apps.reduce((sum, app) => sum + app.downloads, 0);
    document.getElementById('totalDownloads').innerText = totalDls;
  }

  // --- Navigation ---
  function showView(viewId) {
    document.querySelectorAll('.view').forEach(v => v.classList.remove('active'));
    document.getElementById(viewId).classList.add('active');
    
    if(viewId === 'publicView') {
      renderPublicApps();
    }
    if(viewId === 'dashboardView') {
      renderAdminTable();
      resetForm();
    }
  }

  // --- Public View Render ---
  function renderPublicApps() {
    const apps = getApps();
    const grid = document.getElementById('appGrid');
    
    if(apps.length === 0) {
      grid.innerHTML = '<p style="grid-column: 1/-1; color: var(--text-muted);">No apps available. Admin needs to add some.</p>';
    } else {
      grid.innerHTML = apps.map(app => `
        <div class="card">
          <img src="${app.iconUrl}" alt="${app.name}" onerror="this.src='https://via.placeholder.com/80x80/2a2e37/ffffff?text=APK'">
          <h3>${app.name}</h3>
          <div class="downloads">${app.downloads} Downloads</div>
          <button class="download-btn" onclick="handleDownload(${app.id})">DOWNLOAD</button>
        </div>
      `).join('');
    }
    updateStats();
  }

  function handleDownload(id) {
    const apps = getApps();
    const app = apps.find(a => a.id === id);
    if(app) {
      // Increase download count
      app.downloads++;
      saveApps(apps);
      renderPublicApps();
      
      // Open Dropbox link in new tab
      if(app.link && app.link.trim() !== "") {
         window.open(app.link, '_blank');
      } else {
         alert('Download link not set for this app.');
      }
    }
  }

  // --- Admin Auth ---
  function login() {
    const u = document.getElementById('username').value;
    const p = document.getElementById('password').value;
    
    // Simple demo auth: default is admin / admin
    if(u === 'admin' && p === 'admin') { 
      sessionStorage.setItem('dev_store_isAdmin', 'true');
      document.getElementById('username').value = '';
      document.getElementById('password').value = '';
      showView('dashboardView');
    } else {
      alert('Invalid credentials. Use: admin / admin');
    }
  }

  function logout() {
    sessionStorage.removeItem('dev_store_isAdmin');
    showView('publicView');
  }

  // --- Admin Dashboard ---
  function renderAdminTable() {
    const apps = getApps();
    const tbody = document.getElementById('adminTableBody');
    
    if(apps.length === 0) {
      tbody.innerHTML = '<tr><td colspan="4" style="text-align:center; color: var(--text-muted);">No apps found.</td></tr>';
      return;
    }
    
    tbody.innerHTML = apps.map(app => `
      <tr>
        <td><img src="${app.iconUrl}" width="44" height="44" style="border-radius:10px; object-fit: cover; background: #222;" onerror="this.src='https://via.placeholder.com/44x44/2a2e37/ffffff?text=?'"></td>
        <td><strong>${app.name}</strong><br><small style="color:var(--text-muted); font-size: 0.8rem;">${app.link}</small></td>
        <td>${app.downloads}</td>
        <td>
          <button class="action-btn edit-btn" onclick="editApp(${app.id})">Edit</button>
          <button class="action-btn" style="background:transparent; border: 1px solid var(--border-color); color: white;" onclick="resetDownloads(${app.id})">Reset Dls</button>
          <button class="action-btn delete-btn" onclick="deleteApp(${app.id})">Delete</button>
        </td>
      </tr>
    `).join('');
  }

  function saveApp() {
    const id = document.getElementById('editId').value;
    const name = document.getElementById('appName').value.trim();
    const iconUrl = document.getElementById('appIcon').value.trim();
    const link = document.getElementById('appLink').value.trim();
    
    if(!name || !iconUrl || !link) return alert('Please fill all fields.');

    const apps = getApps();
    if(id) {
      // Edit existing
      const idx = apps.findIndex(a => a.id == id);
      if(idx > -1) {
        apps[idx] = { ...apps[idx], name, iconUrl, link };
      }
    } else {
      // Add new
      apps.push({ id: Date.now(), name, iconUrl, link, downloads: 0 });
    }
    
    saveApps(apps);
    resetForm();
    renderAdminTable();
  }

  function editApp(id) {
    const app = getApps().find(a => a.id === id);
    if(!app) return;
    
    document.getElementById('formTitle').innerText = 'Edit App';
    document.getElementById('editId').value = app.id;
    document.getElementById('appName').value = app.name;
    document.getElementById('appIcon').value = app.iconUrl;
    document.getElementById('appLink').value = app.link;
    
    // Scroll to form
    document.querySelector('.dashboard').scrollIntoView({ behavior: 'smooth' });
  }

  function deleteApp(id) {
    if(!confirm('Are you sure you want to delete this app?')) return;
    saveApps(getApps().filter(a => a.id !== id));
    renderAdminTable();
  }

  function resetDownloads(id) {
    if(!confirm('Reset download counter to 0?')) return;
    const apps = getApps();
    const app = apps.find(a => a.id === id);
    if(app) {
      app.downloads = 0;
      saveApps(apps);
      renderAdminTable();
    }
  }

  function resetForm() {
    document.getElementById('formTitle').innerText = 'Add New App';
    document.getElementById('editId').value = '';
    document.getElementById('appName').value = '';
    document.getElementById('appIcon').value = '';
    document.getElementById('appLink').value = '';
  }

  // --- Initialization ---
  // Seed local storage with defaults if it's empty
  if(!localStorage.getItem('dev_store_apps')) {
    saveApps(defaultApps);
  }

  // Check initial route
  if(sessionStorage.getItem('dev_store_isAdmin') === 'true') {
    showView('dashboardView');
  } else {
    showView('publicView');
  }
</script>
</body>
</html>
